<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>心愿之树 · 每一片叶子都有故事</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <style>
        :root{--sky-top:#050e1a;--sky-mid:#0f2840;--sky-bottom:#1a3a28;--ground:#0e1f14;--gold:#f0c850;--gold-dim:#c8a030;--leaf-shadow:rgba(0,0,0,0.35)}
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;min-height:100vh;overflow-x:hidden;font-family:'Noto Serif SC','PingFang SC','Microsoft YaHei',serif}
        body{background:linear-gradient(180deg,var(--sky-top) 0%,var(--sky-mid) 30%,var(--sky-bottom) 65%,var(--ground) 100%);display:flex;flex-direction:column;align-items:center}
        .aurora{position:fixed;top:0;left:0;right:0;height:55vh;pointer-events:none;z-index:0;overflow:hidden;opacity:.35}
        .aurora-band{position:absolute;width:200%;height:100%;background:linear-gradient(90deg,transparent 0%,rgba(40,200,120,.08) 15%,rgba(60,180,200,.12) 30%,rgba(100,220,150,.06) 45%,transparent 55%,rgba(80,160,220,.1) 70%,rgba(50,200,100,.08) 85%,transparent 100%);animation:auroraFlow var(--a-dur) ease-in-out infinite alternate;filter:blur(40px)}
        @keyframes auroraFlow{0%{transform:translateX(-25%) skewX(-5deg) scaleY(.8)}50%{transform:translateX(-10%) skewX(3deg) scaleY(1.2)}100%{transform:translateX(-30%) skewX(-8deg) scaleY(.9)}}
        .stars{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0;overflow:hidden}
        .star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite alternate}
        @keyframes twinkle{0%{opacity:.1;transform:scale(.7)}100%{opacity:var(--brightness);transform:scale(1.3)}}
        .shooting-star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;pointer-events:none;opacity:0;animation:shoot var(--shoot-dur) linear infinite}
        .shooting-star::after{content:'';position:absolute;top:0;right:100%;width:60px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.6))}
        @keyframes shoot{0%{opacity:0;transform:translate(0,0) rotate(var(--shoot-angle))}5%{opacity:1}15%{opacity:1;transform:translate(var(--shoot-x),var(--shoot-y)) rotate(var(--shoot-angle))}20%{opacity:0;transform:translate(var(--shoot-x),var(--shoot-y)) rotate(var(--shoot-angle))}100%{opacity:0}}
        .firefly{position:absolute;border-radius:50%;pointer-events:none;background:radial-gradient(circle,rgba(255,232,138,.9) 0%,rgba(255,232,138,.3) 40%,transparent 70%);animation:fireflyFloat var(--fly-dur) ease-in-out infinite alternate;opacity:0;box-shadow:0 0 6px 2px rgba(255,230,100,.3)}
        @keyframes fireflyFloat{0%{opacity:0;transform:translate(0,0)}20%{opacity:.85}50%{opacity:.3;transform:translate(var(--fx),var(--fy))}80%{opacity:.9}100%{opacity:0;transform:translate(var(--fx2),var(--fy2))}}
        .petal{position:absolute;pointer-events:none;opacity:0;animation:petalFall var(--petal-dur) linear infinite}
        @keyframes petalFall{0%{opacity:0;transform:translate(0,0) rotate(0deg) scale(.8)}10%{opacity:.5}90%{opacity:.3}100%{opacity:0;transform:translate(var(--petal-x),var(--petal-y)) rotate(var(--petal-rot)) scale(.3)}}
        .main-wrapper{position:relative;z-index:1;width:100%;max-width:1400px;padding:16px;display:flex;flex-direction:column;align-items:center;min-height:100vh}
        .page-header{text-align:center;margin-bottom:16px;animation:fadeSlideDown 1s ease-out}
        .page-header h1{font-family:'Ma Shan Zheng',cursive;font-size:clamp(1.8rem,6vw,3rem);color:var(--gold);text-shadow:0 0 40px rgba(240,200,80,.25),0 2px 4px rgba(0,0,0,.6);letter-spacing:8px}
        .page-header .subtitle{font-size:clamp(.7rem,2vw,.9rem);color:rgba(220,210,180,.5);margin-top:4px;letter-spacing:4px}
        .badges{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:8px}
        .leaf-count-badge,.sync-badge{display:inline-block;padding:3px 16px;border-radius:20px;font-size:.8rem;backdrop-filter:blur(4px)}
        .leaf-count-badge{background:rgba(240,200,80,.12);border:1px solid rgba(240,200,80,.25);color:var(--gold)}
        .sync-badge{background:rgba(100,200,120,.12);border:1px solid rgba(100,200,120,.25);color:#8ad8a0;font-size:.75rem}
        .sync-badge.err{background:rgba(240,100,80,.12);border-color:rgba(240,100,80,.25);color:#e8a090}
        @keyframes fadeSlideDown{0%{opacity:0;transform:translateY(-20px)}100%{opacity:1;transform:translateY(0)}}
        .content-area{display:flex;gap:20px;width:100%;max-width:1300px;align-items:stretch;margin-bottom:20px}
        .tree-scene{position:relative;flex:1;min-width:0;aspect-ratio:16/11;min-height:400px;border-radius:20px;overflow:hidden;background:radial-gradient(ellipse at 50% 85%,#142e18 0%,#0a1a0e 55%,#050e08 100%);box-shadow:0 0 60px rgba(0,0,0,.5),inset 0 0 100px rgba(0,0,0,.5),0 0 1px rgba(100,200,80,.2)}
        .ground{position:absolute;bottom:0;left:0;right:0;height:13%;background:linear-gradient(180deg,#162e1a 0%,#0e1f12 50%,#091408 100%);z-index:2}
        .ground::before{content:'';position:absolute;top:-10px;left:0;right:0;height:20px;background:repeating-linear-gradient(85deg,transparent 0px,transparent 8px,#1e4422 8px,transparent 9px),repeating-linear-gradient(95deg,transparent 0px,transparent 12px,#1a3a1e 12px,transparent 13px),repeating-linear-gradient(88deg,transparent 0px,transparent 6px,#224a28 6px,transparent 7px);opacity:.6}
        .ground-glow{position:absolute;bottom:6%;left:50%;transform:translateX(-50%);width:50%;height:80px;background:radial-gradient(ellipse,rgba(80,160,60,.06) 0%,transparent 70%);z-index:1;pointer-events:none}
        .moon{position:absolute;top:6%;right:10%;width:clamp(45px,9vw,80px);height:clamp(45px,9vw,80px);background:radial-gradient(circle at 30% 30%,#fffef0,#f8eda0,#e8d888);border-radius:50%;box-shadow:0 0 50px 20px rgba(255,250,200,.1),0 0 100px 40px rgba(255,250,200,.04);z-index:1}
        .moon::before{content:'';position:absolute;top:20%;left:25%;width:18%;height:18%;background:rgba(200,180,100,.25);border-radius:50%}
        .moon::after{content:'';position:absolute;top:50%;left:55%;width:12%;height:12%;background:rgba(180,160,90,.2);border-radius:50%}
        .tree-svg-container{position:absolute;top:0;left:0;right:0;bottom:0;z-index:3;pointer-events:none}
        .tree-svg-container svg{width:100%;height:100%}
        .canopy-glow{position:absolute;top:5%;left:50%;transform:translateX(-50%);width:70%;height:50%;background:radial-gradient(ellipse,rgba(60,140,40,.06) 0%,transparent 60%);z-index:2;pointer-events:none;animation:canopyPulse 6s ease-in-out infinite alternate}
        @keyframes canopyPulse{0%{opacity:.5}100%{opacity:1}}
        .leaves-container{position:absolute;top:0;left:0;right:0;bottom:0;z-index:4;pointer-events:none}
        .tree-leaf{position:absolute;pointer-events:all;cursor:pointer;transition:transform .3s cubic-bezier(.34,1.56,.64,1),filter .3s;animation:leafGrow .7s cubic-bezier(.34,1.56,.64,1) forwards;transform-origin:center bottom;z-index:5}
        .tree-leaf:hover{transform:scale(1.4)!important;filter:brightness(1.3) drop-shadow(0 0 12px rgba(180,255,80,.6));z-index:10}
        .tree-leaf svg{width:100%;height:100%;filter:drop-shadow(1px 2px 4px var(--leaf-shadow))}
        @keyframes leafGrow{0%{transform:scale(0) rotate(-30deg);opacity:0}50%{transform:scale(1.2) rotate(5deg);opacity:1}75%{transform:scale(.95) rotate(-2deg)}100%{transform:scale(1) rotate(var(--leaf-rot,0deg));opacity:1}}
        .tree-leaf.sway{animation:leafGrow .7s cubic-bezier(.34,1.56,.64,1) forwards,leafSway var(--sway-dur,4s) ease-in-out var(--sway-delay,0s) infinite alternate}
        @keyframes leafSway{0%{transform:scale(1) rotate(calc(var(--leaf-rot,0deg) - 4deg))}100%{transform:scale(1) rotate(calc(var(--leaf-rot,0deg) + 4deg))}}
        .tree-leaf.flash::after{content:'';position:absolute;top:-6px;left:-6px;right:-6px;bottom:-6px;border-radius:50%;animation:newLeafFlash 1s ease-out forwards}
        @keyframes newLeafFlash{0%{box-shadow:0 0 0 0 rgba(180,255,80,.7)}40%{box-shadow:0 0 25px 10px rgba(180,255,80,.35)}100%{box-shadow:0 0 0 0 rgba(180,255,80,0)}}
        .leaf-sidebar{width:280px;flex-shrink:0;background:rgba(10,20,12,.6);border:1px solid rgba(100,180,80,.12);border-radius:20px;backdrop-filter:blur(16px);display:flex;flex-direction:column;overflow:hidden;box-shadow:0 0 40px rgba(0,0,0,.3),inset 0 0 30px rgba(0,0,0,.2)}
        .sidebar-header{padding:18px 20px 14px;border-bottom:1px solid rgba(100,180,80,.1);display:flex;align-items:center;gap:10px}
        .sidebar-header h2{font-family:'Ma Shan Zheng',cursive;font-size:1.15rem;color:var(--gold-dim);letter-spacing:3px}
        .sidebar-header .sidebar-icon{width:28px;height:28px;background:rgba(100,200,80,.1);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem}
        .sidebar-scroll{flex:1;overflow:hidden;position:relative;min-height:200px}
        .sidebar-track{position:absolute;top:0;left:0;right:0;animation:sidebarScroll var(--scroll-dur,30s) linear infinite}
        @keyframes sidebarScroll{0%{transform:translateY(0)}100%{transform:translateY(-50%)}}
        .sidebar-track:hover{animation-play-state:paused}
        .sidebar-item{padding:14px 20px;border-bottom:1px solid rgba(100,180,80,.06);transition:background .3s;cursor:pointer}
        .sidebar-item:hover{background:rgba(100,200,80,.08)}
        .sidebar-item-text{font-size:.88rem;color:rgba(210,230,200,.85);line-height:1.55;word-break:break-word}
        .sidebar-item-time{font-size:.68rem;color:rgba(150,170,130,.4);margin-top:6px}
        .sidebar-item-index{display:inline-block;width:20px;height:20px;background:rgba(100,180,80,.12);border-radius:6px;text-align:center;line-height:20px;font-size:.65rem;color:rgba(160,210,140,.6);margin-right:8px;font-weight:bold;vertical-align:middle}
        .sidebar-empty{padding:40px 20px;text-align:center;color:rgba(150,170,130,.3);font-size:.85rem;font-style:italic}
        .sidebar-footer{padding:10px 16px;border-top:1px solid rgba(100,180,80,.08);text-align:center;font-size:.7rem;color:rgba(140,160,120,.3)}
        .leaf-popup-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(3,10,5,.75);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .35s}
        .leaf-popup-overlay.visible{opacity:1;pointer-events:all}
        .leaf-popup{background:linear-gradient(145deg,#f6f2e4 0%,#ece4cc 100%);border-radius:24px;padding:40px 44px;max-width:500px;width:90%;text-align:center;transform:scale(.8) translateY(30px);transition:transform .45s cubic-bezier(.34,1.56,.64,1);box-shadow:0 25px 80px rgba(0,0,0,.5),0 0 0 1px rgba(200,180,120,.2);position:relative}
        .leaf-popup-overlay.visible .leaf-popup{transform:scale(1) translateY(0)}
        .popup-leaf-icon{font-size:2.5rem;margin-bottom:10px;display:block}
        .popup-text{font-family:'Ma Shan Zheng',cursive;font-size:clamp(1.5rem,5vw,2.2rem);color:#2a4a1e;line-height:1.6;word-break:break-word}
        .popup-time{margin-top:16px;font-size:.78rem;color:#9a8a60}
        .popup-close{position:absolute;top:14px;right:18px;background:none;border:none;font-size:1.3rem;color:#a09070;cursor:pointer;padding:4px 8px;border-radius:8px;box-shadow:none}
        .input-area{width:100%;max-width:800px;margin-bottom:24px;animation:fadeSlideDown 1s ease-out .3s both}
        .input-card{background:rgba(255,250,230,.06);border:1px solid rgba(240,200,80,.12);backdrop-filter:blur(16px);border-radius:18px;padding:20px 24px;display:flex;flex-direction:column;gap:14px}
        .input-label{font-family:'Ma Shan Zheng',cursive;font-size:1.15rem;color:var(--gold-dim);display:flex;align-items:center;gap:8px}
        .input-row{display:flex;gap:12px;align-items:stretch}
        .input-row input{flex:1;padding:13px 20px;border-radius:14px;border:1px solid rgba(240,200,80,.18);background:rgba(255,255,255,.05);color:#f0e8d0;font-size:1rem;font-family:'Noto Serif SC',serif;outline:none;transition:all .3s;-webkit-appearance:none}
        .input-row input::placeholder{color:rgba(200,190,160,.35)}
        .input-row input:focus{border-color:var(--gold);background:rgba(255,255,255,.09);box-shadow:0 0 25px rgba(240,200,80,.08)}
        .btn-send{padding:13px 26px;border-radius:14px;border:none;background:linear-gradient(135deg,#4a8a30,#3a6a24);color:#e8f0d0;font-family:'Ma Shan Zheng',cursive;font-size:1.1rem;cursor:pointer;transition:all .3s;box-shadow:0 4px 15px rgba(60,120,40,.3);white-space:nowrap;letter-spacing:2px;display:flex;align-items:center;gap:6px}
        .btn-send:hover{background:linear-gradient(135deg,#5a9a3a,#4a7a2e);box-shadow:0 4px 25px rgba(60,120,40,.5);transform:translateY(-1px)}
        .btn-send:active{transform:scale(.97)}
        .action-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
        .btn-secondary{padding:9px 18px;border-radius:12px;border:1px solid rgba(240,200,80,.15);background:rgba(255,255,255,.03);color:rgba(220,210,180,.6);font-family:'Noto Serif SC',serif;font-size:.82rem;cursor:pointer;transition:all .3s;box-shadow:none;display:flex;align-items:center;gap:6px}
        .btn-secondary:hover{background:rgba(255,255,255,.07);border-color:rgba(240,200,80,.35);color:var(--gold-dim)}
        .status-text{font-size:.78rem;color:rgba(180,170,140,.5);text-align:center;min-height:1.2em;flex:1}
        .page-footer{text-align:center;padding:16px;color:rgba(130,120,90,.3);font-size:.7rem;letter-spacing:3px}
        .particle{position:absolute;border-radius:50%;pointer-events:none;z-index:20}
        @keyframes particleBurst{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--px),var(--py)) scale(0)}}
        @media(max-width:900px){.content-area{flex-direction:column}.leaf-sidebar{width:100%;max-height:220px}.sidebar-scroll{min-height:120px}.tree-scene{aspect-ratio:4/3;min-height:350px}}
        @media(max-width:600px){.main-wrapper{padding:10px 8px}.tree-scene{min-height:280px;border-radius:14px}.page-header h1{letter-spacing:4px}.input-row{flex-direction:column}.btn-send{justify-content:center}.input-card{padding:16px 18px}.leaf-sidebar{max-height:180px;border-radius:14px}}
    </style>
</head>
<body>
<div class="aurora"><div class="aurora-band" style="top:0;--a-dur:18s;opacity:.7"></div><div class="aurora-band" style="top:15%;--a-dur:24s;opacity:.5;animation-delay:-6s"></div><div class="aurora-band" style="top:5%;--a-dur:30s;opacity:.3;animation-delay:-12s"></div></div>
<div class="stars" id="starsContainer"></div>
<div class="main-wrapper">
    <header class="page-header">
        <h1>心 愿 之 树</h1>
        <div class="subtitle">每一片叶子，都承载一份心声</div>
        <div class="badges"><div class="leaf-count-badge" id="leafBadge">🍃 0 片树叶</div><div class="sync-badge" id="syncBadge">⏳ 连接中…</div></div>
    </header>
    <div class="content-area">
        <div class="tree-scene" id="treeScene">
            <div class="moon"></div><div class="ground"></div><div class="ground-glow"></div><div class="canopy-glow"></div>

                    <defs>

ke="#3a2210" stroke-width="9"/><path d="M345 305 Q315 290,290 305" stroke="#3a2210" stroke-width="5"/><path d="M560 310 Q585 300,615 310" stroke="#3a2210" stroke-width="5"/></g>

                </svg>
            </div>
            <div class="leaves-container" id="leavesContainer"></div>
            <div id="firefliesContainer"></div>
        </div>
        <div class="leaf-sidebar">
            <div class="sidebar-header"><div class="sidebar-icon">🍃</div><h2>叶片心语</h2></div>
            <div class="sidebar-scroll"><div class="sidebar-empty" id="sidebarEmpty">还没有树叶，写下第一片吧…</div><div class="sidebar-track" id="sidebarTrack"></div></div>

            <div class="action-row"><button class="btn-secondary" id="resetBtn">🍂 重置大树</button><div class="status-text" id="statusText">点击树叶可以查看完整内容</div></div>

<div class="leaf-popup-overlay" id="popupOverlay"><div class="leaf-popup"><button class="popup-close" id="popupClose">✕</button><span class="popup-leaf-icon">🍀</span><div class="popup-text" id="popupText"></div><div class="popup-time" id="popupTime"></div></div></div>

<script>
(function(){'use strict';

// ====== Firebase 配置（已写死）======
firebase.initializeApp({
    apiKey: "AIzaSyCxn35jkodZ0qIAkDAxzqUUvNi1ZOGe3ww",
    authDomain: "wish-tree-a6b4e.firebaseapp.com",
    databaseURL: "https://wish-tree-a6b4e-default-rtdb.firebaseio.com",
    projectId: "wish-tree-a6b4e",
    storageBucket: "wish-tree-a6b4e.firebasestorage.app",
    messagingSenderId: "333802650650",
    appId: "1:333802650650:web:87dd2f85bb40a63046a5a3"
});

const db = firebase.database();
const dbRef = db.ref('wish-tree/leaves');
let firebaseOK = false;
let leaves = [];
let knownIds = new Set();

// ====== DOM ======
const lC=document.getElementById('leavesContainer'),tI=document.getElementById('textInput'),sB=document.getElementById('sendBtn'),rB=document.getElementById('resetBtn'),sT=document.getElementById('statusText'),lB=document.getElementById('leafBadge'),syB=document.getElementById('syncBadge'),pO=document.getElementById('popupOverlay'),pCl=document.getElementById('popupClose'),pT=document.getElementById('popupText'),pTi=document.getElementById('popupTime'),tS=document.getElementById('treeScene'),sTr=document.getElementById('sidebarTrack'),sE=document.getElementById('sidebarEmpty'),sF=document.getElementById('sidebarFooter');

// ====== Branch tips ======
const bT=[{x:18.3,y:25},{x:19.4,y:26.6},{x:21.1,y:34.7},{x:23.9,y:27.4},{x:26.1,y:18.5},{x:30.6,y:43.2},{x:32.2,y:49.2},{x:32.8,y:29},{x:32.2,y:22.6},{x:43.9,y:21},{x:46.2,y:12.1},{x:48.7,y:12.9},{x:51.3,y:11.3},{x:55,y:20.2},{x:66.1,y:31.5},{x:68.3,y:43.9},{x:68.3,y:50},{x:74.4,y:20.2},{x:78.3,y:28.2},{x:78.3,y:39.5},{x:81.7,y:27.4},{x:82.2,y:27.4},{x:22,y:30},{x:28,y:23},{x:35,y:25},{x:38,y:17},{x:42,y:15},{x:48,y:14},{x:52,y:16},{x:56,y:21},{x:60,y:25},{x:65,y:23},{x:70,y:27},{x:75,y:23},{x:30,y:35},{x:36,y:31},{x:40,y:27},{x:50,y:19},{x:58,y:27},{x:62,y:34},{x:68,y:31},{x:72,y:35},{x:25,y:37},{x:45,y:23},{x:55,y:24},{x:63,y:39},{x:34,y:43},{x:20,y:33},{x:27,y:28},{x:33,y:22},{x:43,y:18},{x:53,y:18},{x:59,y:30},{x:66,y:36},{x:73,y:30},{x:78,y:34}];
const lCo=[{fill:'#4a9228',stroke:'#35701a',vein:'#3e8220',hi:'rgba(180,255,120,.15)'},{fill:'#5ca832',stroke:'#3d7a1c',vein:'#4a8a28',hi:'rgba(200,255,150,.12)'},{fill:'#6db840',stroke:'#4a8a28',vein:'#5aa032',hi:'rgba(210,255,160,.12)'},{fill:'#7ec850',stroke:'#5aa035',vein:'#6ab040',hi:'rgba(220,255,170,.1)'},{fill:'#88d060',stroke:'#60a840',vein:'#70b848',hi:'rgba(220,255,180,.1)'},{fill:'#78c048',stroke:'#58a030',vein:'#68b040',hi:'rgba(200,255,150,.12)'},{fill:'#60b035',stroke:'#408820',vein:'#509828',hi:'rgba(190,255,140,.13)'},{fill:'#4da030',stroke:'#388018',vein:'#429025',hi:'rgba(180,255,130,.14)'},{fill:'#9ad870',stroke:'#70b048',vein:'#80c058',hi:'rgba(230,255,200,.1)'},{fill:'#a0d880',stroke:'#78b858',vein:'#88c868',hi:'rgba(235,255,210,.1)'}];

// ====== Leaf SVG ======
function mkSVG(c,sz){const w=sz,h=sz*1.5,ns='http://www.w3.org/2000/svg';const s=document.createElementNS(ns,'svg');s.setAttribute('viewBox','0 0 '+w+' '+h);s.setAttribute('width',w);s.setAttribute('height',h);s.style.overflow='visible';const cx=w/2,tY=1,bY=h-2,mY=h*.38,bu=w*.48;const lf=document.createElementNS(ns,'path');lf.setAttribute('d','M '+cx+' '+tY+' C '+(cx-bu*.2)+' '+(tY+h*.08)+','+(cx-bu*.95)+' '+(mY-h*.12)+','+(cx-bu*.88)+' '+mY+' C '+(cx-bu*.78)+' '+(mY+h*.12)+','+(cx-bu*.4)+' '+(bY-h*.15)+','+(cx+1)+' '+bY+' C '+(cx+bu*.35)+' '+(bY-h*.12)+','+(cx+bu*.75)+' '+(mY+h*.15)+','+(cx+bu*.85)+' '+(mY+h*.02)+' C '+(cx+bu*.92)+' '+(mY-h*.1)+','+(cx+bu*.25)+' '+(tY+h*.1)+','+cx+' '+tY+' Z');lf.setAttribute('fill',c.fill);lf.setAttribute('stroke',c.stroke);lf.setAttribute('stroke-width','.6');const sh=document.createElementNS(ns,'path');sh.setAttribute('d','M '+(cx+1)+' '+bY+' C '+(cx+bu*.35)+' '+(bY-h*.12)+','+(cx+bu*.75)+' '+(mY+h*.15)+','+(cx+bu*.85)+' '+(mY+h*.02)+' C '+(cx+bu*.92)+' '+(mY-h*.1)+','+(cx+bu*.25)+' '+(tY+h*.1)+','+cx+' '+tY);sh.setAttribute('fill','rgba(0,0,0,.06)');sh.setAttribute('stroke','none');const mr=document.createElementNS(ns,'path');mr.setAttribute('d','M '+cx+' '+(tY+2)+' Q '+(cx+.5)+' '+mY+','+(cx+1)+' '+(bY-2));mr.setAttribute('stroke',c.vein);mr.setAttribute('stroke-width','.9');mr.setAttribute('fill','none');mr.setAttribute('opacity','.55');const vg=document.createElementNS(ns,'g');vg.setAttribute('stroke',c.vein);vg.setAttribute('stroke-width','.4');vg.setAttribute('opacity','.3');vg.setAttribute('fill','none');for(let i=1;i<=5;i++){const t=i/6,vy=tY+(bY-tY)*t,vcx=cx+.5*t,sp=bu*.5*Math.sin(Math.PI*t);const vl=document.createElementNS(ns,'path');vl.setAttribute('d','M '+vcx+' '+vy+' Q '+(vcx-sp*.5)+' '+(vy-4*t)+','+(vcx-sp*.9)+' '+(vy-2));vg.appendChild(vl);const vr=document.createElementNS(ns,'path');vr.setAttribute('d','M '+vcx+' '+vy+' Q '+(vcx+sp*.5)+' '+(vy-3*t)+','+(vcx+sp*.85)+' '+(vy-1));vg.appendChild(vr)}const hl=document.createElementNS(ns,'ellipse');hl.setAttribute('cx',cx-w*.12);hl.setAttribute('cy',mY-h*.03);hl.setAttribute('rx',w*.14);hl.setAttribute('ry',h*.1);hl.setAttribute('fill',c.hi);hl.setAttribute('transform','rotate(-20 '+cx+' '+mY+')');s.appendChild(lf);s.appendChild(sh);s.appendChild(mr);s.appendChild(vg);s.appendChild(hl);return s}

function gLP(i){const t=bT[i%bT.length];return{xPercent:Math.max(12,Math.min(88,t.x+(Math.random()-.5)*7)),yPercent:Math.max(6,Math.min(52,t.y+(Math.random()-.5)*5))}}

function rL(d,i,a){const e=document.createElement('div');e.className='tree-leaf'+(a?' flash':' sway');const sz=18+Math.random()*14,co=lCo[i%lCo.length],ro=(Math.random()-.5)*70;e.style.cssText='left:'+d.xPercent+'%;top:'+d.yPercent+'%;width:'+sz+'px;height:'+sz*1.5+'px;--leaf-rot:'+ro+'deg;--sway-dur:'+(3+Math.random()*4)+'s;--sway-delay:'+Math.random()*3+'s;transform:translate(-50%,-50%) rotate('+ro+'deg);';e.appendChild(mkSVG(co,sz));e.addEventListener('click',function(ev){ev.stopPropagation();showPopup(d)});if(a)setTimeout(function(){e.classList.remove('flash');e.classList.add('sway')},900);return e}

function renderAll(){lC.innerHTML='';leaves.forEach(function(l,i){lC.appendChild(rL(l,i,false))});uC();uS()}
function uC(){lB.textContent='🍃 '+leaves.length+' 片树叶'}
function setSt(m,c,d){sT.textContent=m;sT.style.color=c||'';if(d)setTimeout(function(){sT.textContent='☁️ 实时同步中 · 点击树叶查看';sT.style.color=''},d)}

// ====== Sidebar ======
function uS(){if(!leaves.length){sE.style.display='block';sTr.style.display='none';sF.textContent='等待第一片树叶…';return}sE.style.display='none';sTr.style.display='block';sF.textContent='共 '+leaves.length+' 条心语 · 自动滚动';sTr.innerHTML='';var items=leaves.concat(leaves);items.forEach(function(l,i){var idx=i%leaves.length;var d=document.createElement('div');d.className='sidebar-item';d.innerHTML='<div class="sidebar-item-text"><span class="sidebar-item-index">'+(idx+1)+'</span>'+esc(l.text)+'</div><div class="sidebar-item-time">'+fmtT(l.timestamp)+'</div>';d.addEventListener('click',function(){showPopup(leaves[idx])});sTr.appendChild(d)});var dur=Math.max(15,leaves.length*4);sTr.style.animation='sidebarScroll '+dur+'s linear infinite'}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fmtT(ts){return new Date(ts).toLocaleString('zh-CN',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}

// ====== Firebase 实时同步 ======
function initFirebaseSync(){
    // 监听新增的叶子（实时）
    dbRef.on('child_added', function(snapshot){
        var leafData = snapshot.val();
        if(!leafData) return;
        var key = snapshot.key;
        if(knownIds.has(key)) return;
        knownIds.add(key);
        leafData._key = key;
        leaves.push(leafData);
        // 如果是初次加载，不播放动画
        if(firebaseOK){
            lC.appendChild(rL(leafData, leaves.length-1, true));
            cPB(leafData.xPercent, leafData.yPercent);
        } else {
            lC.appendChild(rL(leafData, leaves.length-1, false));
        }
        uC(); uS();
    });

    // 监听删除（重置时）
    dbRef.on('child_removed', function(snapshot){
        var key = snapshot.key;
        knownIds.delete(key);
        leaves = leaves.filter(function(l){return l._key !== key});
        renderAll();
    });

    // 连接状态监测
    var connRef = firebase.database().ref('.info/connected');
    connRef.on('value', function(snap){
        if(snap.val() === true){
            firebaseOK = true;
            syB.textContent = '☁️ 实时同步中';
            syB.className = 'sync-badge';
            setSt('☁️ 已连接云端，所有设备实时同步！','rgba(160,220,100,.8)',3000);
        } else {
            syB.textContent = '⏳ 连接中…';
            syB.className = 'sync-badge';
        }
    });
}

// ====== 添加树叶 ======
function addLeaf(t){
    if(!t||!t.trim()){setSt('请先写下你的心声…','rgba(240,180,80,.8)',2000);return}
    var c=t.trim().slice(0,80);
    var p=gLP(leaves.length);
    var leafData={
        text:c,
        xPercent:p.xPercent,
        yPercent:p.yPercent,
        timestamp:Date.now(),
        id:'leaf_'+Date.now()+'_'+Math.random().toString(36).slice(2,6)
    };
    // 写入 Firebase（会自动触发 child_added 回调）
    dbRef.push(leafData).then(function(){
        setSt('🍃 已同步：「'+(c.length>12?c.slice(0,11)+'…':c)+'」','rgba(160,220,100,.8)',2500);
    }).catch(function(err){
        console.error('写入失败:',err);
        setSt('❌ 同步失败，请检查网络','rgba(240,100,80,.8)',3000);
    });
}

// ====== 重置 ======
function resetTree(){
    if(leaves.length>0&&!confirm('🍂 确定重置？所有设备上的树叶都会消失。'))return;
    dbRef.remove().then(function(){
        leaves=[];knownIds.clear();lC.innerHTML='';uC();uS();
        setSt('🍂 大树已重置','rgba(200,180,100,.7)',3000);
    }).catch(function(err){
        console.error('重置失败:',err);
        setSt('❌ 重置失败，请检查网络','rgba(240,100,80,.8)',3000);
    });
}

// ====== 粒子 ======
function cPB(x,y){for(var i=0;i<10;i++){var p=document.createElement('div');p.className='particle';var a=(Math.PI*2*i)/10+(Math.random()-.5)*.5,d=20+Math.random()*35,sz=2+Math.random()*3;p.style.cssText='left:'+x+'%;top:'+y+'%;width:'+sz+'px;height:'+sz+'px;background:'+['#c8ff70','#ffe880','#90e040','#ffd060','#a0ff50'][i%5]+';--px:'+Math.cos(a)*d+'px;--py:'+Math.sin(a)*d+'px;animation:particleBurst .7s ease-out forwards;';tS.appendChild(p);setTimeout(function(){p.remove()},800)}}

// ====== 弹窗 ======
function showPopup(d){pT.textContent=d.text;pTi.textContent=new Date(d.timestamp).toLocaleString('zh-CN',{month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'});pO.classList.add('visible')}
pO.addEventListener('click',function(e){if(e.target===pO)pO.classList.remove('visible')});
pCl.addEventListener('click',function(){pO.classList.remove('visible')});

// ====== 特效 ======
function mkStars(){var c=document.getElementById('starsContainer');for(var i=0;i<80;i++){var s=document.createElement('div');s.className='star';var sz=.5+Math.random()*2.5;s.style.cssText='left:'+Math.random()*100+'%;top:'+Math.random()*55+'%;width:'+sz+'px;height:'+sz+'px;--dur:'+(1.5+Math.random()*5)+'s;--brightness:'+(0.25+Math.random()*.75)+';animation-delay:'+Math.random()*5+'s;';c.appendChild(s)}for(var i=0;i<3;i++){var ss=document.createElement('div');ss.className='shooting-star';var an=-30-Math.random()*20;ss.style.cssText='left:'+(20+Math.random()*60)+'%;top:'+(5+Math.random()*20)+'%;--shoot-dur:'+(8+Math.random()*12)+'s;--shoot-angle:'+an+'deg;--shoot-x:'+(150+Math.random()*200)+'px;--shoot-y:'+(80+Math.random()*120)+'px;animation-delay:'+(i*5+Math.random()*8)+'s;';c.appendChild(ss)}}
function mkFF(){var c=document.getElementById('firefliesContainer');for(var i=0;i<8;i++){var f=document.createElement('div');f.className='firefly';var sz=3+Math.random()*4;f.style.cssText='left:'+(15+Math.random()*70)+'%;top:'+(25+Math.random()*55)+'%;width:'+sz+'px;height:'+sz+'px;--fly-dur:'+(4+Math.random()*7)+'s;--fx:'+((Math.random()-.5)*100)+'px;--fy:'+((Math.random()-.5)*70)+'px;--fx2:'+((Math.random()-.5)*120)+'px;--fy2:'+((Math.random()-.5)*90)+'px;animation-delay:'+Math.random()*8+'s;';c.appendChild(f)}}
function mkPetals(){var c=document.getElementById('starsContainer');for(var i=0;i<5;i++){var p=document.createElement('div');p.className='petal';var sz=4+Math.random()*4;p.innerHTML='<svg width="'+sz+'" height="'+sz*1.3+'" viewBox="0 0 10 13"><ellipse cx="5" cy="6.5" rx="4" ry="6" fill="rgba(180,255,120,.4)" stroke="rgba(120,200,80,.3)" stroke-width=".5"/></svg>';p.style.cssText='left:'+(10+Math.random()*80)+'%;top:-5%;--petal-dur:'+(12+Math.random()*18)+'s;--petal-x:'+((Math.random()-.5)*150)+'px;--petal-y:'+(500+Math.random()*400)+'px;--petal-rot:'+(200+Math.random()*400)+'deg;animation-delay:'+Math.random()*20+'s;';c.appendChild(p)}}

// ====== 事件 ======
sB.addEventListener('click',function(){addLeaf(tI.value);tI.value='';tI.focus()});
tI.addEventListener('keypress',function(e){if(e.key==='Enter'){addLeaf(tI.value);tI.value=''}});
rB.addEventListener('click',resetTree);

// ====== 初始化 ======
mkStars(); mkFF(); mkPetals(); initFirebaseSync();

})();
</script>
