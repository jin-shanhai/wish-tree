<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>心愿之树 · 每一片叶子都有故事</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-top: #0a1628;
            --sky-mid: #1a3a5c;
            --sky-bottom: #2d5a3f;
            --ground: #1a3320;
            --gold: #f0c850;
            --gold-dim: #c8a030;
            --bark-dark: #3d2410;
            --bark-mid: #5c3a1e;
            --bark-light: #7a5230;
            --leaf-shadow: rgba(0,0,0,0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
            font-family: 'Noto Serif SC', 'PingFang SC', 'Microsoft YaHei', serif;
        }

        body {
            background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 35%, var(--sky-bottom) 70%, var(--ground) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ===== Stars background ===== */
        .stars {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .star {
            position: absolute;
            width: 2px; height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--dur) ease-in-out infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.15; transform: scale(0.8); }
            100% { opacity: var(--brightness); transform: scale(1.2); }
        }

        /* ===== Fireflies ===== */
        .firefly {
            position: absolute;
            width: 4px; height: 4px;
            background: radial-gradient(circle, #ffe88a 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: fireflyFloat var(--fly-dur) ease-in-out infinite alternate;
            opacity: 0;
        }
        @keyframes fireflyFloat {
            0% { opacity: 0; transform: translate(0, 0); }
            25% { opacity: 0.9; }
            50% { opacity: 0.4; transform: translate(var(--fx), var(--fy)); }
            75% { opacity: 0.8; }
            100% { opacity: 0; transform: translate(var(--fx2), var(--fy2)); }
        }

        /* ===== Main container ===== */
        .main-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 1100px;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* ===== Header ===== */
        .page-header {
            text-align: center;
            margin-bottom: 20px;
            animation: fadeSlideDown 1s ease-out;
        }
        .page-header h1 {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: clamp(2rem, 7vw, 3.2rem);
            color: var(--gold);
            text-shadow: 0 0 30px rgba(240,200,80,0.3), 0 2px 4px rgba(0,0,0,0.5);
            letter-spacing: 6px;
        }
        .page-header .subtitle {
            font-size: clamp(0.75rem, 2.5vw, 0.95rem);
            color: rgba(220,210,180,0.7);
            margin-top: 6px;
            letter-spacing: 3px;
        }
        .leaf-count-badge {
            display: inline-block;
            margin-top: 10px;
            background: rgba(240,200,80,0.15);
            border: 1px solid rgba(240,200,80,0.3);
            color: var(--gold);
            padding: 4px 18px;
            border-radius: 20px;
            font-size: 0.85rem;
            backdrop-filter: blur(4px);
        }

        @keyframes fadeSlideDown {
            0% { opacity: 0; transform: translateY(-20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ===== Tree Scene ===== */
        .tree-scene {
            position: relative;
            width: 100%;
            max-width: 900px;
            aspect-ratio: 16 / 11;
            min-height: 400px;
            border-radius: 24px;
            overflow: hidden;
            background: radial-gradient(ellipse at 50% 80%, #1a3a20 0%, #0d1f12 60%, #060e08 100%);
            box-shadow: 
                0 0 60px rgba(0,0,0,0.5),
                inset 0 0 80px rgba(0,0,0,0.4),
                0 0 120px rgba(30,80,40,0.1);
            margin-bottom: 24px;
        }

        /* Ground */
        .ground {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 14%;
            background: linear-gradient(180deg, #1a3a20 0%, #12291a 40%, #0d1f12 100%);
            z-index: 2;
        }
        .ground::before {
            content: '';
            position: absolute;
            top: -8px; left: 0; right: 0;
            height: 16px;
            background: repeating-conic-gradient(#2a5530 0% 25%, transparent 0% 50%) 0 0 / 20px 16px;
            opacity: 0.5;
        }

        /* Ground glow under tree */
        .ground-glow {
            position: absolute;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 60px;
            background: radial-gradient(ellipse, rgba(100,180,80,0.08) 0%, transparent 70%);
            z-index: 1;
            pointer-events: none;
        }

        /* Moon */
        .moon {
            position: absolute;
            top: 8%; right: 12%;
            width: clamp(40px, 8vw, 70px);
            height: clamp(40px, 8vw, 70px);
            background: radial-gradient(circle at 35% 35%, #fffde8, #f5e6a0);
            border-radius: 50%;
            box-shadow: 0 0 40px 15px rgba(255,250,200,0.15), 0 0 80px 30px rgba(255,250,200,0.06);
            z-index: 1;
        }
        .moon::after {
            content: '';
            position: absolute;
            top: 18%; left: 22%;
            width: 20%; height: 20%;
            background: rgba(200,180,120,0.3);
            border-radius: 50%;
        }

        /* ===== SVG Tree ===== */
        .tree-svg-container {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 3;
            pointer-events: none;
        }
        .tree-svg-container svg {
            width: 100%;
            height: 100%;
        }

        /* ===== Leaves container ===== */
        .leaves-container {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 4;
            pointer-events: none;
        }

        /* ===== Individual leaf ===== */
        .tree-leaf {
            position: absolute;
            pointer-events: all;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.3s;
            animation: leafGrow 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            transform-origin: center bottom;
            z-index: 5;
        }
        .tree-leaf:hover {
            transform: scale(1.25) !important;
            filter: brightness(1.2) drop-shadow(0 0 8px rgba(200,255,100,0.4));
            z-index: 10;
        }
        .tree-leaf svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(1px 2px 3px var(--leaf-shadow));
        }

        @keyframes leafGrow {
            0% { transform: scale(0) rotate(-20deg); opacity: 0; }
            60% { transform: scale(1.15) rotate(3deg); opacity: 1; }
            100% { transform: scale(1) rotate(var(--leaf-rot, 0deg)); opacity: 1; }
        }

        /* Gentle sway */
        .tree-leaf.sway {
            animation: leafGrow 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
                       leafSway var(--sway-dur, 4s) ease-in-out var(--sway-delay, 0s) infinite alternate;
        }
        @keyframes leafSway {
            0% { transform: scale(1) rotate(calc(var(--leaf-rot, 0deg) - 3deg)); }
            100% { transform: scale(1) rotate(calc(var(--leaf-rot, 0deg) + 3deg)); }
        }

        /* ===== Leaf popup / tooltip ===== */
        .leaf-popup-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(5,15,8,0.7);
            backdrop-filter: blur(6px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s;
        }
        .leaf-popup-overlay.visible {
            opacity: 1;
            pointer-events: all;
        }
        .leaf-popup {
            background: linear-gradient(135deg, #f4f0e0 0%, #e8dfc8 100%);
            border-radius: 24px;
            padding: 36px 40px;
            max-width: 480px;
            width: 90%;
            text-align: center;
            transform: scale(0.85) translateY(20px);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(200,180,120,0.3);
            position: relative;
        }
        .leaf-popup-overlay.visible .leaf-popup {
            transform: scale(1) translateY(0);
        }
        .leaf-popup .popup-leaf-icon {
            font-size: 3rem;
            margin-bottom: 12px;
            display: block;
        }
        .leaf-popup .popup-text {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: clamp(1.4rem, 5vw, 2rem);
            color: #2a4a20;
            line-height: 1.6;
            word-break: break-word;
        }
        .leaf-popup .popup-time {
            margin-top: 14px;
            font-size: 0.8rem;
            color: #8a7a5a;
        }
        .leaf-popup .popup-close {
            position: absolute;
            top: 12px; right: 16px;
            background: none;
            border: none;
            font-size: 1.4rem;
            color: #9a8a6a;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            box-shadow: none;
        }
        .leaf-popup .popup-close:hover {
            color: #5a4a2a;
        }

        /* ===== Input area ===== */
        .input-area {
            width: 100%;
            max-width: 700px;
            margin-bottom: 30px;
            animation: fadeSlideDown 1s ease-out 0.3s both;
        }
        .input-card {
            background: rgba(255,250,230,0.08);
            border: 1px solid rgba(240,200,80,0.15);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 24px 28px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .input-label {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.2rem;
            color: var(--gold-dim);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .input-row {
            display: flex;
            gap: 12px;
            align-items: stretch;
        }
        .input-row input {
            flex: 1;
            padding: 14px 22px;
            border-radius: 14px;
            border: 1px solid rgba(240,200,80,0.2);
            background: rgba(255,255,255,0.06);
            color: #f0e8d0;
            font-size: 1rem;
            font-family: 'Noto Serif SC', serif;
            outline: none;
            transition: all 0.3s;
            -webkit-appearance: none;
        }
        .input-row input::placeholder {
            color: rgba(200,190,160,0.4);
        }
        .input-row input:focus {
            border-color: var(--gold);
            background: rgba(255,255,255,0.1);
            box-shadow: 0 0 20px rgba(240,200,80,0.1);
        }
        .btn-send {
            padding: 14px 28px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, #4a8a30, #3a6a24);
            color: #e8f0d0;
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.15rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(60,120,40,0.3);
            white-space: nowrap;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-send:hover {
            background: linear-gradient(135deg, #5a9a3a, #4a7a2e);
            box-shadow: 0 4px 20px rgba(60,120,40,0.5);
            transform: translateY(-1px);
        }
        .btn-send:active {
            transform: scale(0.97);
        }

        .action-btns {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn-secondary {
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid rgba(240,200,80,0.2);
            background: rgba(255,255,255,0.04);
            color: rgba(220,210,180,0.7);
            font-family: 'Noto Serif SC', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(240,200,80,0.4);
            color: var(--gold-dim);
        }

        .status-text {
            font-size: 0.8rem;
            color: rgba(180,170,140,0.6);
            text-align: center;
            margin-top: 4px;
            min-height: 1.2em;
            transition: color 0.3s;
        }

        /* ===== Footer ===== */
        .page-footer {
            text-align: center;
            padding: 20px;
            color: rgba(150,140,110,0.4);
            font-size: 0.75rem;
            letter-spacing: 2px;
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            .tree-scene {
                aspect-ratio: 4 / 3.5;
                border-radius: 18px;
                min-height: 350px;
            }
            .input-row {
                flex-direction: column;
            }
            .btn-send {
                justify-content: center;
            }
            .input-card {
                padding: 18px 20px;
            }
        }
        @media (max-width: 480px) {
            .main-wrapper { padding: 12px 10px; }
            .tree-scene { min-height: 300px; border-radius: 14px; }
            .page-header h1 { letter-spacing: 3px; }
        }

        /* ===== New leaf flash ===== */
        @keyframes newLeafFlash {
            0% { box-shadow: 0 0 0 0 rgba(200,255,100,0.6); }
            50% { box-shadow: 0 0 20px 8px rgba(200,255,100,0.3); }
            100% { box-shadow: 0 0 0 0 rgba(200,255,100,0); }
        }
        .tree-leaf.flash {
            animation: leafGrow 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        .tree-leaf.flash::after {
            content: '';
            position: absolute;
            top: -4px; left: -4px; right: -4px; bottom: -4px;
            border-radius: 50%;
            animation: newLeafFlash 0.8s ease-out forwards;
        }

        /* Particle burst on new leaf */
        .particle {
            position: absolute;
            width: 4px; height: 4px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 20;
        }
        @keyframes particleBurst {
            0% { opacity: 1; transform: translate(0,0) scale(1); }
            100% { opacity: 0; transform: translate(var(--px), var(--py)) scale(0); }
        }
    </style>
</head>
<body>

<!-- Stars -->
<div class="stars" id="starsContainer"></div>

<div class="main-wrapper">
    <!-- Header -->
    <header class="page-header">
        <h1>心愿之树</h1>
        <div class="subtitle">每一片叶子，都承载一份心声</div>
        <div class="leaf-count-badge" id="leafBadge">🍃 0 片树叶</div>
    </header>

    <!-- Tree Scene -->
    <div class="tree-scene" id="treeScene">
        <div class="moon"></div>
        <div class="ground"></div>
        <div class="ground-glow"></div>

        <!-- SVG Tree -->
        <div class="tree-svg-container">
            <svg viewBox="0 0 900 620" preserveAspectRatio="xMidYMax meet" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <!-- bark texture gradient -->
                    <linearGradient id="barkGrad" x1="0" y1="0" x2="1" y2="0">
                        <stop offset="0%" stop-color="#3d2410"/>
                        <stop offset="30%" stop-color="#5c3a1e"/>
                        <stop offset="50%" stop-color="#6a4828"/>
                        <stop offset="70%" stop-color="#5c3a1e"/>
                        <stop offset="100%" stop-color="#3d2410"/>
                    </linearGradient>
                    <linearGradient id="barkGrad2" x1="0" y1="0" x2="1" y2="0">
                        <stop offset="0%" stop-color="#4a2e16"/>
                        <stop offset="50%" stop-color="#6b4428"/>
                        <stop offset="100%" stop-color="#4a2e16"/>
                    </linearGradient>
                    <!-- Glow filter for branches -->
                    <filter id="branchGlow">
                        <feGaussianBlur stdDeviation="1.5" result="blur"/>
                        <feMerge>
                            <feMergeNode in="blur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                </defs>

                <!-- Root system -->
                <g opacity="0.6">
                    <path d="M410 545 Q380 560, 340 555 Q310 558, 290 565" stroke="#3d2410" stroke-width="8" fill="none" stroke-linecap="round"/>
                    <path d="M490 545 Q520 558, 560 552 Q590 558, 620 565" stroke="#3d2410" stroke-width="7" fill="none" stroke-linecap="round"/>
                    <path d="M430 550 Q410 565, 370 570" stroke="#3d2410" stroke-width="5" fill="none" stroke-linecap="round"/>
                    <path d="M470 548 Q495 565, 540 568" stroke="#3d2410" stroke-width="5" fill="none" stroke-linecap="round"/>
                </g>

                <!-- Main trunk -->
                <path d="M420 545 Q415 480, 425 420 Q430 360, 440 310 Q445 270, 450 240" 
                      stroke="url(#barkGrad)" stroke-width="42" fill="none" stroke-linecap="round"/>
                <path d="M480 545 Q485 480, 475 420 Q470 360, 460 310 Q455 270, 450 240" 
                      stroke="url(#barkGrad)" stroke-width="38" fill="none" stroke-linecap="round"/>
                <!-- Trunk inner highlight -->
                <path d="M445 540 Q440 460, 448 380 Q452 310, 450 245" 
                      stroke="#7a5a35" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.4"/>

                <!-- Bark texture lines -->
                <g stroke="#2e1a08" opacity="0.3" fill="none" stroke-width="1">
                    <path d="M430 530 Q435 500, 432 470"/>
                    <path d="M465 530 Q462 495, 466 460"/>
                    <path d="M440 450 Q443 420, 440 390"/>
                    <path d="M460 440 Q457 410, 460 380"/>
                    <path d="M445 370 Q448 340, 446 310"/>
                    <path d="M455 360 Q452 330, 455 300"/>
                </g>

                <!-- Main branches -->
                <g stroke-linecap="round" fill="none">
                    <!-- Left main -->
                    <path d="M445 300 Q400 270, 340 240 Q290 215, 240 195" stroke="url(#barkGrad2)" stroke-width="18"/>
                    <path d="M340 240 Q310 220, 270 230 Q230 238, 195 220" stroke="#4a2e16" stroke-width="10"/>
                    <path d="M290 215 Q260 195, 220 175" stroke="#4a2e16" stroke-width="8"/>
                    <path d="M240 195 Q210 175, 170 160" stroke="#4a2e16" stroke-width="7"/>
                    <path d="M340 240 Q320 260, 280 270" stroke="#4a2e16" stroke-width="7"/>

                    <!-- Right main -->
                    <path d="M455 290 Q510 260, 570 235 Q620 215, 670 200" stroke="url(#barkGrad2)" stroke-width="16"/>
                    <path d="M570 235 Q610 220, 640 245 Q665 260, 700 250" stroke="#4a2e16" stroke-width="9"/>
                    <path d="M620 215 Q660 195, 700 180" stroke="#4a2e16" stroke-width="7"/>
                    <path d="M670 200 Q700 185, 730 175" stroke="#4a2e16" stroke-width="6"/>
                    <path d="M570 235 Q585 260, 610 275" stroke="#4a2e16" stroke-width="6"/>

                    <!-- Center top -->
                    <path d="M450 260 Q448 220, 445 180 Q442 150, 440 120" stroke="url(#barkGrad2)" stroke-width="14"/>
                    <path d="M445 180 Q425 155, 400 135" stroke="#4a2e16" stroke-width="8"/>
                    <path d="M445 180 Q465 150, 490 130" stroke="#4a2e16" stroke-width="7"/>
                    <path d="M440 120 Q430 100, 420 80" stroke="#4a2e16" stroke-width="6"/>
                    <path d="M440 120 Q455 95, 465 75" stroke="#4a2e16" stroke-width="5"/>

                    <!-- Upper left -->
                    <path d="M440 260 Q395 230, 350 190 Q320 168, 290 145" stroke="#4a2e16" stroke-width="11"/>
                    <path d="M350 190 Q325 175, 300 185" stroke="#4a2e16" stroke-width="6"/>
                    <path d="M290 145 Q265 128, 240 120" stroke="#4a2e16" stroke-width="5"/>

                    <!-- Upper right -->
                    <path d="M458 255 Q500 225, 550 195 Q585 175, 620 155" stroke="#4a2e16" stroke-width="10"/>
                    <path d="M550 195 Q575 180, 590 200" stroke="#4a2e16" stroke-width="6"/>
                    <path d="M620 155 Q645 140, 665 130" stroke="#4a2e16" stroke-width="5"/>

                    <!-- Lower side branches -->
                    <path d="M435 350 Q390 340, 350 310" stroke="#4a2e16" stroke-width="9"/>
                    <path d="M465 345 Q510 330, 555 315" stroke="#4a2e16" stroke-width="8"/>
                    <path d="M350 310 Q320 295, 295 310" stroke="#4a2e16" stroke-width="5"/>
                    <path d="M555 315 Q580 305, 610 315" stroke="#4a2e16" stroke-width="5"/>
                </g>

                <!-- Branch tip buds/knots -->
                <g fill="#5c3a1e">
                    <circle cx="170" cy="160" r="5"/>
                    <circle cx="195" cy="220" r="4.5"/>
                    <circle cx="220" cy="175" r="4"/>
                    <circle cx="240" cy="120" r="4"/>
                    <circle cx="280" cy="270" r="4"/>
                    <circle cx="295" cy="310" r="4"/>
                    <circle cx="300" cy="185" r="3.5"/>
                    <circle cx="400" cy="135" r="4"/>
                    <circle cx="420" cy="80" r="3.5"/>
                    <circle cx="465" cy="75" r="3.5"/>
                    <circle cx="490" cy="130" r="4"/>
                    <circle cx="590" cy="200" r="3.5"/>
                    <circle cx="610" cy="275" r="3.5"/>
                    <circle cx="610" cy="315" r="3.5"/>
                    <circle cx="665" cy="130" r="4"/>
                    <circle cx="700" cy="180" r="4"/>
                    <circle cx="700" cy="250" r="4.5"/>
                    <circle cx="730" cy="175" r="3.5"/>
                </g>
            </svg>
        </div>

        <!-- Leaves will be injected here -->
        <div class="leaves-container" id="leavesContainer"></div>

        <!-- Fireflies -->
        <div id="firefliesContainer"></div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
        <div class="input-card">
            <div class="input-label">🍃 写下一片树叶</div>
            <div class="input-row">
                <input type="text" id="textInput" placeholder="写下你的心声，让它长成一片叶子…" maxlength="80" autocomplete="off">
                <button class="btn-send" id="sendBtn">🌿 添枝加叶</button>
            </div>
            <div class="action-btns">
                <button class="btn-secondary" id="voiceBtn">🎙️ 语音输入</button>
                <button class="btn-secondary" id="resetBtn">🍂 重置大树</button>
            </div>
            <div class="status-text" id="statusText">点击树叶可以查看完整内容</div>
        </div>
    </div>

    <footer class="page-footer">心愿之树 · 每一片叶子都承载一份心声</footer>
</div>

<!-- Leaf popup overlay -->
<div class="leaf-popup-overlay" id="popupOverlay">
    <div class="leaf-popup" id="popupCard">
        <button class="popup-close" id="popupClose">✕</button>
        <span class="popup-leaf-icon">🍀</span>
        <div class="popup-text" id="popupText"></div>
        <div class="popup-time" id="popupTime"></div>
    </div>
</div>

<script>
(function() {
    'use strict';

    // ====== Data ======
    let leaves = [];
    const STORAGE_KEY = 'wish_tree_leaves_v1';

    // ====== DOM ======
    const treeScene = document.getElementById('treeScene');
    const leavesContainer = document.getElementById('leavesContainer');
    const textInput = document.getElementById('textInput');
    const sendBtn = document.getElementById('sendBtn');
    const voiceBtn = document.getElementById('voiceBtn');
    const resetBtn = document.getElementById('resetBtn');
    const statusText = document.getElementById('statusText');
    const leafBadge = document.getElementById('leafBadge');
    const popupOverlay = document.getElementById('popupOverlay');
    const popupCard = document.getElementById('popupCard');
    const popupClose = document.getElementById('popupClose');
    const popupText = document.getElementById('popupText');
    const popupTime = document.getElementById('popupTime');

    // ====== Branch tip positions (percentage of scene) ======
    // These match the SVG branch endpoints
    const branchTips = [
        // Left side
        { x: 18.8, y: 25.8 }, // 170,160
        { x: 21.6, y: 35.5 }, // 195,220
        { x: 24.4, y: 28.2 }, // 220,175
        { x: 26.6, y: 19.4 }, // 240,120
        { x: 31.1, y: 43.5 }, // 280,270
        { x: 32.8, y: 50.0 }, // 295,310
        { x: 33.3, y: 29.8 }, // 300,185
        { x: 31.7, y: 30.6 }, // 290,145 (approx mid)
        // Center
        { x: 44.4, y: 21.8 }, // 400,135
        { x: 46.7, y: 12.9 }, // 420,80
        { x: 51.6, y: 12.1 }, // 465,75
        { x: 54.4, y: 21.0 }, // 490,130
        // Right side
        { x: 65.6, y: 32.3 }, // 590,200
        { x: 67.8, y: 44.4 }, // 610,275
        { x: 67.8, y: 50.8 }, // 610,315
        { x: 73.9, y: 21.0 }, // 665,130
        { x: 77.8, y: 29.0 }, // 700,180
        { x: 77.8, y: 40.3 }, // 700,250
        { x: 81.1, y: 28.2 }, // 730,175
        // Extra foliage positions (between branches)
        { x: 22, y: 31 },
        { x: 28, y: 24 },
        { x: 35, y: 26 },
        { x: 38, y: 18 },
        { x: 42, y: 16 },
        { x: 48, y: 15 },
        { x: 52, y: 17 },
        { x: 56, y: 22 },
        { x: 60, y: 26 },
        { x: 65, y: 24 },
        { x: 70, y: 28 },
        { x: 75, y: 24 },
        { x: 30, y: 36 },
        { x: 36, y: 32 },
        { x: 40, y: 28 },
        { x: 50, y: 20 },
        { x: 58, y: 28 },
        { x: 62, y: 35 },
        { x: 68, y: 32 },
        { x: 72, y: 36 },
        { x: 25, y: 38 },
        { x: 45, y: 24 },
        { x: 55, y: 25 },
        { x: 63, y: 40 },
        { x: 34, y: 44 },
    ];

    // Leaf colors - rich natural greens with seasonal variation
    const leafColors = [
        { fill: '#5ca832', stroke: '#3d7a1c', vein: '#4a8a28' },
        { fill: '#6db840', stroke: '#4a8a28', vein: '#5aa032' },
        { fill: '#7ec850', stroke: '#5aa035', vein: '#6ab040' },
        { fill: '#4a9628', stroke: '#357018', vein: '#408520' },
        { fill: '#88d060', stroke: '#60a840', vein: '#70b848' },
        { fill: '#9ad870', stroke: '#70b048', vein: '#80c058' },
        { fill: '#78c048', stroke: '#58a030', vein: '#68b040' },
        { fill: '#a0d880', stroke: '#78b858', vein: '#88c868' },
        { fill: '#60b035', stroke: '#408820', vein: '#509828' },
    ];

    // ====== Create SVG leaf shape ======
    function createLeafSVG(color, size) {
        const w = size;
        const h = size * 1.4;
        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
        svg.setAttribute('width', w);
        svg.setAttribute('height', h);
        svg.style.overflow = 'visible';

        // Leaf body - a more natural leaf shape using bezier curves
        const leaf = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        const cx = w / 2;
        const tipY = 2;
        const baseY = h - 3;
        const midY = h * 0.4;
        const bulge = w * 0.5;
        
        leaf.setAttribute('d', `
            M ${cx} ${tipY}
            C ${cx - bulge * 0.3} ${tipY + h * 0.1}, ${cx - bulge} ${midY - h * 0.1}, ${cx - bulge * 0.85} ${midY}
            C ${cx - bulge * 0.7} ${midY + h * 0.15}, ${cx - bulge * 0.3} ${baseY - h * 0.1}, ${cx} ${baseY}
            C ${cx + bulge * 0.3} ${baseY - h * 0.1}, ${cx + bulge * 0.7} ${midY + h * 0.15}, ${cx + bulge * 0.85} ${midY}
            C ${cx + bulge} ${midY - h * 0.1}, ${cx + bulge * 0.3} ${tipY + h * 0.1}, ${cx} ${tipY}
            Z
        `);
        leaf.setAttribute('fill', color.fill);
        leaf.setAttribute('stroke', color.stroke);
        leaf.setAttribute('stroke-width', '0.8');

        // Midrib (central vein)
        const midrib = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        midrib.setAttribute('x1', cx);
        midrib.setAttribute('y1', tipY + 2);
        midrib.setAttribute('x2', cx);
        midrib.setAttribute('y2', baseY - 2);
        midrib.setAttribute('stroke', color.vein);
        midrib.setAttribute('stroke-width', '0.8');
        midrib.setAttribute('opacity', '0.6');

        // Side veins
        const veinsGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        veinsGroup.setAttribute('stroke', color.vein);
        veinsGroup.setAttribute('stroke-width', '0.5');
        veinsGroup.setAttribute('opacity', '0.35');
        veinsGroup.setAttribute('fill', 'none');
        
        const veinCount = 4;
        for (let i = 1; i <= veinCount; i++) {
            const vy = tipY + (baseY - tipY) * (i / (veinCount + 1));
            const spread = bulge * 0.55 * Math.sin(Math.PI * i / (veinCount + 1));
            
            const vl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            vl.setAttribute('d', `M ${cx} ${vy} Q ${cx - spread * 0.5} ${vy - 3}, ${cx - spread} ${vy - 1}`);
            veinsGroup.appendChild(vl);
            
            const vr = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            vr.setAttribute('d', `M ${cx} ${vy} Q ${cx + spread * 0.5} ${vy - 3}, ${cx + spread} ${vy - 1}`);
            veinsGroup.appendChild(vr);
        }

        // Highlight
        const highlight = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
        highlight.setAttribute('cx', cx - w * 0.1);
        highlight.setAttribute('cy', midY - h * 0.05);
        highlight.setAttribute('rx', w * 0.15);
        highlight.setAttribute('ry', h * 0.12);
        highlight.setAttribute('fill', 'rgba(255,255,255,0.12)');
        highlight.setAttribute('transform', `rotate(-15 ${cx} ${midY})`);

        svg.appendChild(leaf);
        svg.appendChild(midrib);
        svg.appendChild(veinsGroup);
        svg.appendChild(highlight);
        return svg;
    }

    // ====== Generate leaf position ======
    function getLeafPosition(index) {
        // Cycle through branch tips, add randomness
        const tipIndex = index % branchTips.length;
        const tip = branchTips[tipIndex];
        const jitterX = (Math.random() - 0.5) * 8;
        const jitterY = (Math.random() - 0.5) * 6;
        return {
            xPercent: Math.max(10, Math.min(90, tip.x + jitterX)),
            yPercent: Math.max(8, Math.min(52, tip.y + jitterY))
        };
    }

    // ====== Render a single leaf DOM element ======
    function renderLeaf(leafData, index, animate) {
        const el = document.createElement('div');
        el.className = 'tree-leaf' + (animate ? ' flash' : ' sway');
        
        const size = 20 + Math.random() * 12;
        const color = leafColors[index % leafColors.length];
        const rot = (Math.random() - 0.5) * 60;
        const swayDur = 3 + Math.random() * 3;
        const swayDelay = Math.random() * 2;

        el.style.cssText = `
            left: ${leafData.xPercent}%;
            top: ${leafData.yPercent}%;
            width: ${size}px;
            height: ${size * 1.4}px;
            --leaf-rot: ${rot}deg;
            --sway-dur: ${swayDur}s;
            --sway-delay: ${swayDelay}s;
            transform: translate(-50%, -50%) rotate(${rot}deg);
        `;

        const svg = createLeafSVG(color, size);
        el.appendChild(svg);

        // Click to show popup
        el.addEventListener('click', (e) => {
            e.stopPropagation();
            showPopup(leafData);
        });

        // After grow animation, add sway
        if (animate) {
            setTimeout(() => {
                el.classList.remove('flash');
                el.classList.add('sway');
            }, 800);
        }

        return el;
    }

    // ====== Render all leaves ======
    function renderAllLeaves() {
        leavesContainer.innerHTML = '';
        leaves.forEach((leaf, i) => {
            const el = renderLeaf(leaf, i, false);
            leavesContainer.appendChild(el);
        });
        updateCount();
    }

    // ====== Add a new leaf ======
    function addLeaf(text) {
        if (!text || text.trim() === '') {
            statusText.textContent = '请先写下你的心声…';
            statusText.style.color = 'rgba(240,180,80,0.8)';
            setTimeout(() => {
                statusText.textContent = '点击树叶可以查看完整内容';
                statusText.style.color = '';
            }, 2000);
            return;
        }

        const cleanText = text.trim().slice(0, 80);
        const pos = getLeafPosition(leaves.length);
        
        const leafData = {
            text: cleanText,
            xPercent: pos.xPercent,
            yPercent: pos.yPercent,
            timestamp: Date.now(),
            id: 'leaf_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6)
        };

        leaves.push(leafData);
        saveLeaves();

        // Render new leaf with animation
        const el = renderLeaf(leafData, leaves.length - 1, true);
        leavesContainer.appendChild(el);

        // Particle burst effect
        createParticleBurst(pos.xPercent, pos.yPercent);

        updateCount();
        statusText.textContent = `🍃 新叶已添：「${cleanText.length > 15 ? cleanText.slice(0, 14) + '…' : cleanText}」`;
        statusText.style.color = 'rgba(160,220,100,0.8)';
        setTimeout(() => {
            statusText.textContent = `大树现在有 ${leaves.length} 片树叶了！点击叶子查看内容`;
            statusText.style.color = '';
        }, 2500);
    }

    // ====== Particle burst ======
    function createParticleBurst(xPct, yPct) {
        const scene = treeScene;
        const count = 8;
        for (let i = 0; i < count; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
            const dist = 20 + Math.random() * 30;
            const px = Math.cos(angle) * dist;
            const py = Math.sin(angle) * dist;
            p.style.cssText = `
                left: ${xPct}%;
                top: ${yPct}%;
                background: ${['#c8ff70', '#ffe880', '#90e040', '#ffd060'][i % 4]};
                --px: ${px}px;
                --py: ${py}px;
                animation: particleBurst 0.6s ease-out forwards;
            `;
            scene.appendChild(p);
            setTimeout(() => p.remove(), 700);
        }
    }

    // ====== Show popup ======
    function showPopup(leafData) {
        popupText.textContent = leafData.text;
        const date = new Date(leafData.timestamp);
        const timeStr = date.toLocaleString('zh-CN', {
            month: 'long', day: 'numeric',
            hour: '2-digit', minute: '2-digit'
        });
        popupTime.textContent = timeStr;
        popupOverlay.classList.add('visible');
    }

    function hidePopup() {
        popupOverlay.classList.remove('visible');
    }

    // ====== Update count ======
    function updateCount() {
        leafBadge.textContent = `🍃 ${leaves.length} 片树叶`;
    }

    // ====== Storage ======
    function saveLeaves() {
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(leaves));
        } catch (e) { /* ignore */ }
    }
    function loadLeaves() {
        try {
            const data = localStorage.getItem(STORAGE_KEY);
            if (data) {
                leaves = JSON.parse(data);
                return true;
            }
        } catch (e) { /* ignore */ }
        return false;
    }

    // ====== Stars ======
    function createStars() {
        const container = document.getElementById('starsContainer');
        const count = 60;
        for (let i = 0; i < count; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.cssText = `
                left: ${Math.random() * 100}%;
                top: ${Math.random() * 50}%;
                --dur: ${2 + Math.random() * 4}s;
                --brightness: ${0.3 + Math.random() * 0.7};
                animation-delay: ${Math.random() * 4}s;
                width: ${1 + Math.random() * 2}px;
                height: ${1 + Math.random() * 2}px;
            `;
            container.appendChild(star);
        }
    }

    // ====== Fireflies ======
    function createFireflies() {
        const container = document.getElementById('firefliesContainer');
        const count = 6;
        for (let i = 0; i < count; i++) {
            const ff = document.createElement('div');
            ff.className = 'firefly';
            ff.style.cssText = `
                left: ${20 + Math.random() * 60}%;
                top: ${30 + Math.random() * 50}%;
                --fly-dur: ${5 + Math.random() * 6}s;
                --fx: ${(Math.random() - 0.5) * 80}px;
                --fy: ${(Math.random() - 0.5) * 60}px;
                --fx2: ${(Math.random() - 0.5) * 100}px;
                --fy2: ${(Math.random() - 0.5) * 80}px;
                animation-delay: ${Math.random() * 6}s;
                width: ${3 + Math.random() * 3}px;
                height: ${3 + Math.random() * 3}px;
            `;
            container.appendChild(ff);
        }
    }

    // ====== Voice recognition ======
    let recognition = null;
    let isListening = false;

    function initSpeech() {
        const API = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!API) {
            voiceBtn.style.opacity = '0.4';
            voiceBtn.style.pointerEvents = 'none';
            voiceBtn.textContent = '🎙️ 不支持语音';
            return;
        }
        recognition = new API();
        recognition.lang = 'zh-CN';
        recognition.interimResults = false;
        recognition.onstart = () => {
            isListening = true;
            voiceBtn.textContent = '🎙️ 聆听中…';
            voiceBtn.style.borderColor = 'rgba(240,80,80,0.5)';
        };
        recognition.onresult = (e) => {
            const t = e.results[0][0].transcript;
            if (t && t.trim()) addLeaf(t);
            stopSpeech();
        };
        recognition.onerror = () => stopSpeech();
        recognition.onend = () => stopSpeech();
    }
    function stopSpeech() {
        isListening = false;
        voiceBtn.textContent = '🎙️ 语音输入';
        voiceBtn.style.borderColor = '';
    }
    function toggleSpeech() {
        if (!recognition) { initSpeech(); if (!recognition) return; }
        if (isListening) { recognition.stop(); stopSpeech(); return; }
        try { recognition.start(); } catch(e) {}
    }

    // ====== Reset ======
    function resetTree() {
        if (leaves.length > 0 && !confirm('🍂 确定要重置大树吗？所有树叶都会消失。')) return;
        leaves = [];
        saveLeaves();
        leavesContainer.innerHTML = '';
        updateCount();
        statusText.textContent = '🍂 大树已重置，等待新的心声…';
    }

    // ====== Events ======
    sendBtn.addEventListener('click', () => {
        addLeaf(textInput.value);
        textInput.value = '';
        textInput.focus();
    });
    textInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            addLeaf(textInput.value);
            textInput.value = '';
        }
    });
    voiceBtn.addEventListener('click', toggleSpeech);
    resetBtn.addEventListener('click', resetTree);
    popupOverlay.addEventListener('click', (e) => {
        if (e.target === popupOverlay) hidePopup();
    });
    popupClose.addEventListener('click', hidePopup);

    // ====== Init ======
    function init() {
        createStars();
        createFireflies();
        initSpeech();
        loadLeaves();
        renderAllLeaves();
    }

    init();
})();
</script>

</html>
